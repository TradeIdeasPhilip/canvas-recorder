<!doctype html>
<html>
  <head>
    <link rel="icon" href="sound-explorer.svg" type="image/svg" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sound Explorer</title>
    <script type="module" crossorigin src="./assets/ -DChEKo5Q.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/modulepreload-polyfill-B5Qt9EMX.js">
    <link rel="modulepreload" crossorigin href="./assets/client-misc-Bw4b0CXO.js">
    <link rel="stylesheet" crossorigin href="./assets/ -COQiK-DX.css">
  </head>
  <body>
    <h1>Sound Explorer</h1>
    <div style="display: flex; align-items: center; gap: 0.75em">
      <audio id="soundExplorer" style="flex-grow: 1" controls></audio>
    </div>
    <div style="display: flex; align-items: center; gap: 0.75em">
      <canvas
        id="audioViewer"
        style="height: 5em; flex-grow: 1; width: 100%"
      ></canvas>
    </div>
    <div>
      <button id="zoomOut">Zoom Out</button>
      <button id="panLeft">← Pan Left</button>
      <button id="recenter">Recenter</button>
      <button id="panRight">Pan Right →</button>
    </div>
    <div id="selectionInfo" style="font-family: Verdana; font-weight: normal">Mouse position...</div>
    <div id="soundStatus"></div>
    <table id="soundClips">
      <tr>
        <th>Start</th>
        <th>End</th>
        <th>Duration</th>
        <th>Notes</th>
      </tr>
      <tr class="emptyTableMessage">
        <td
          colspan="4"
          style="font-family: serif; font-style: italic; font-weight: normal; text-align: center"
        >
          (empty)
        </td>
      </tr>
    </table>
  </body>
</html>
